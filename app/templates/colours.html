{% extends "base.html" %}


{% block app_content %}
  <h1>Colour key</h1>
  <div>
    <table class="table">
      <tr>
        <th scope="col">Temperature</th>
        <th scope="col">Colour</th>
      </tr>
      {% for row in rows %}
      <tr>
        <td>{{ row['temperature'] }}</td>
        <td id="{{ row['hex_value'] }}">{{ row['hex_value'] }}</td>
      </tr>
      {% endfor %}
    </table>
  </div>
{% endblock %}


{% block app_js %}
  <script>
    "use strict";
    {% for row in rows %}
      document.getElementById("{{ row['hex_value'] }}").style.background = "#{{ row['hex_value'] }}";
    {% endfor %}
  </script>
{% endblock %}
